name: Web CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      # Mirrors Vercel Production rules (scripts/validate-production-env.mjs)
      ENFORCE_PRODUCTION_ENV: "true"
      NODE_ENV: production
      NEXT_PUBLIC_USE_DEMO_EVENTS: "false"
      NEXT_PUBLIC_USE_API_CHECKOUT: "true"
      API_URL: https://ci-placeholder-api.example.com
      NEXT_PUBLIC_API_BASE_URL: https://ci-placeholder-api.example.com
      NEXT_PUBLIC_SITE_URL: https://ci-placeholder-web.example.com

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run type check
        run: npm run typecheck

      - name: Build application
        run: npm run build

