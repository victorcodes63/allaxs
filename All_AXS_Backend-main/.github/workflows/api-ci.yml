name: API CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  test:
    name: Lint, Type Check, Test & Build
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Database configuration - Use DATABASE_URL_TEST for test isolation
      DATABASE_URL_TEST: postgres://test_user:test_password@localhost:5432/test_db
      # Allow test database name override for CI (CI uses 'test_db' instead of 'allaxs_test')
      EXPECTED_TEST_DB_NAME: test_db
      # Keep individual parameters for backwards compatibility (not used if DATABASE_URL_TEST is set)
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: test_db
      DB_USER: test_user
      DB_PASS: test_password
      
      # JWT secrets for testing
      JWT_SECRET: test-jwt-secret-for-ci-only
      JWT_REFRESH_SECRET: test-refresh-secret-for-ci-only
      
      # Redis configuration
      REDIS_URL: redis://localhost:6379
      
      # Application config
      NODE_ENV: test
      LOG_LEVEL: error
      ENABLE_TEST_ROUTES: "true"
      
      # Email config (test mode)
      EMAIL_PROVIDER: resend
      RESEND_API_KEY: test_dummy_key_for_ci
      RESEND_FROM: onboarding@resend.dev
      FRONTEND_URL: http://localhost:3000

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup database
        run: |
          # Install PostgreSQL client for migrations
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          
          # Wait for PostgreSQL to be ready
          until pg_isready -h localhost -p 5432 -U test_user; do
            echo "Waiting for PostgreSQL..."
            sleep 2
          done
          
          # Enable citext extension (required for case-insensitive emails)
          PGPASSWORD=test_password psql -h localhost -U test_user -d test_db -c "CREATE EXTENSION IF NOT EXISTS citext;"

      - name: Run database migrations
        run: npm run migrate:run

      - name: Run ESLint
        run: npm run lint:check

      - name: Run TypeScript type checking
        run: npm run typecheck

      - name: Run tests with coverage
        run: npm run test:ci

      - name: Run e2e tests
        run: npm run test:e2e
        continue-on-error: true  # E2E tests may fail if not fully configured
      
      - name: Upload coverage to Codecov (optional)
        if: success()
        uses: codecov/codecov-action@v4
        continue-on-error: true
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella

      - name: Build application
        run: npm run build

      - name: Upload build artifacts (optional)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

